<!-- LifeCare Hospital Appointment Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - LifeCare Hospital</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/appointment.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-flex">
      <div class="logo">LifeCare Hospital</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="doctors.html">Doctors</a></li>
        <li><a href="appointment.html" class="active">Appointment</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button id="mode-toggle" aria-label="Toggle dark mode"></button>
    </div>
  </nav>

  <!-- Appointment Form Section -->
  <section class="appointment-section fade-in">
    <h2>Book an Appointment</h2>
    <form id="appointment-form" novalidate>
      <div class="form-group">
        <label for="patientName">Patient Name</label>
        <input type="text" id="patientName" name="patientName" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" required pattern="[0-9]{10,}">
      </div>
      <div class="form-group">
        <label for="doctor">Doctor</label>
        <select id="doctor" name="doctor" required>
          <option value="">Select Doctor</option>
        </select>
      </div>
      <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="">Select Department</option>
          <option value="Cardiology">Cardiology</option>
          <option value="Neurology">Neurology</option>
          <option value="Orthopedics">Orthopedics</option>
          <option value="Pediatrics">Pediatrics</option>
        </select>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>
      </div>
      <div class="form-group">
        <label for="time">Time</label>
        <input type="time" id="time" name="time" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="3" required></textarea>
      </div>
      <button type="submit" class="cta-btn">Book Appointment</button>
      <div id="appointment-success" class="success-message"></div>
    </form>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div>Contact: 123-456-7890 | info@lifecare.com</div>
      <div>123 Health St, Wellness City</div>
      <div>
        <a href="index.html">Home</a> |
        <a href="doctors.html">Doctors</a> |
        <a href="appointment.html">Appointment</a> |
        <a href="contact.html">Contact</a>
      </div>
      <div>&copy; 2026 LifeCare Hospital</div>
    </div>
  </footer>
</body>
</html>
